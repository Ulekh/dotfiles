# --- General Configuration ---
# Minimalist approach: single line, no unnecessary gaps
add_newline = false

# Single-line format: Directory -> Git -> Node -> Python -> Character
format = "$directory$git_branch$git_status$nodejs$python$character"

# --- Character (The prompt symbol) ---
# Yellow lightning bolt on success, red on error
[character]
success_symbol = "[⚡](bold yellow)"
error_symbol = "[⚡](bold red)"

# --- Directory ---
[directory]
style = "bold blue"
read_only = " 󰌾"
truncation_length = 3
truncation_symbol = "…/"

# --- Git ---
[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

# --- Node.js ---
[nodejs]
symbol = "⬢ "
format = "via [$symbol($version )]($style)"
style = "bold green"
# Only show if these files are found
detect_files = ["package.json", ".node-version", "node_modules"]
detect_extensions = ["js", "ts", "jsx", "tsx"]

# --- Python ---
[python]
symbol = " "
format = "via [${symbol}${pyenv_prefix}(${version} )]($style)"
style = "bold yellow"
detect_files = [".python-version", "Pipfile", "pyproject.toml", "requirements.txt", "setup.py", "tox.ini"]
detect_extensions = ["py"]

# --- AWS ---
[aws]
disabled = true 

# --- Status ---
[status]
disabled = true

# --- Languages & Tools Symbols (Keeping icons if they appear) ---
[golang]
symbol = " "
[rust]
symbol = "󱘗 "
[docker_context]
symbol = " "
disabled = true
