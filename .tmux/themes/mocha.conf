# --- Catppuccin Mocha (Dark Mode) ---
set -g status-style bg='#1e1e2e',fg='#cdd6f4'

# Left side - Session & Prefix Indicator
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[bg=#fab387]#[fg=#1e1e2e],#[fg=#a6e3a1]} bold ❐ #S #[          default] "

# Middle - Window List
set -g window-status-format '#[fg=#6c7086] #I:#W#{?window_zoomed_flag, 󰁌 ,} '
set -g window-status-current-format '#[fg=#fab387,bold,bg=#313244] #I:#W#{?window_zoomed_flag, 󰁌 ,} '

# Right side - Date & Time
set -g status-right-length 50
set -g status-right '#[fg=#89b4fa] %Y-%m-%d #[fg=#f5c2e7] %H:%M '

# Pane Borders
set -g pane-border-style fg='#313244'
set -g pane-active-border-style fg='#89b4fa'
