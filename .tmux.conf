# --- Terminal Compatibility ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# --- General Settings ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5

# --- Window/Session Navigation ---
# Switch windows using Shift-Arrow (Browser-like tabs)
bind -n S-Left  previous-window
bind -n S-Right next-window

# "Super Switcher" - Press Ctrl-b then T to fuzzy search sessions and windows
bind T display-popup -E "tmux list-sessions -F '#S' | fzf --reverse --header 'Jump to Session' | xargs tmux switch-client -t"
bind f display-popup -E "tmux list-windows -a -F '#S:#I - #W' | fzf --reverse --header 'Jump to Window' | cut -d ' ' -f 1 | xargs tmux switch-client -t"

# --- Mouse & Clipboard ---
# Use vi-style keybindings in copy mode
setw -g mode-keys vi

# Don't exit copy mode or clear selection when the mouse button is released
unbind -T copy-mode-vi MouseDragEnd1Pane

# Copy the selection to the system clipboard (macOS) on 'y' or mouse release
# This requires pbcopy, which is built into macOS
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Dynamic Theme ---
# Background listener for macOS Appearance changes
run-shell -b "dark-notify -c '~/.local/bin/tmux-sync-theme'"

# This theme source will be updated automatically based on macOS Appearance
source-file ~/.tmux/themes/current.conf
