# --- Catppuccin Latte (Light Mode) ---
set -g status-style bg='#eff1f5',fg='#4c4f69'

# Left side - Session & Prefix Indicator
# The background changes to Yellow only when Prefix (Ctrl-b) is active
set -g status-left-length 30
set -g status-left "#{?client_prefix,#[bg=#df8e1d]#[fg=#eff1f5],#[fg=#40a02b]} bold ❐ #S #[          default] "

# Middle - Window List
# Added [Z] indicator for zoomed panes
set -g window-status-format '#[fg=#7c7f93] #I:#W#{?window_zoomed_flag, 󰁌 ,} '
set -g window-status-current-format '#[fg=#fe640b,bold,bg=#ccd0da] #I:#W#{?window_zoomed_flag, 󰁌 ,} '

# Right side - Date & Time
set -g status-right-length 50
set -g status-right '#[fg=#1e66f5] %Y-%m-%d #[fg=#ea76cb] %H:%M '

# Pane Borders
set -g pane-border-style fg='#bcc0cc'
set -g pane-active-border-style fg='#1e66f5'
